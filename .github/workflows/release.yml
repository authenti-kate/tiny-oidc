name: Release container image

# Builds and publishes the container image when a version tag is pushed, e.g.
#
#     git tag -a v0.2.0 -m "..." && git push origin v0.2.0
#
# The tag drives the image tags (see the metadata step), so nothing here needs
# editing at release time.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # The end-to-end suite drives a real browser against real servers.
      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium

      - name: Run the full suite
        run: uv run pytest -q

  build:
    name: Build and push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required by actions/attest-build-provenance.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7.0.0

      # Emulation for the linux/arm64 leg of the build.
      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.IMAGE }}
          # v1.2.3 -> :1.2.3, :1.2, :sha-abc1234, and :latest (the default
          # latest=auto flavour skips pre-releases such as v1.2.3-rc1).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.description=A deliberately tiny OpenID Connect provider, for functional testing and low-complexity proofs of concept

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Lets `gh attestation verify` prove this image came from this workflow,
      # from this commit.
      - name: Attest provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
